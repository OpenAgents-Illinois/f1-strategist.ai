<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F1 Strategist — Live Pit Wall</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #666;
      --red: #e8002d;
      --green: #00c853;
      --yellow: #ffd600;
      --blue: #2979ff;
      --font: 'Courier New', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      padding: 24px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
      margin-bottom: 24px;
    }

    header h1 {
      font-size: 1.2rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--red);
    }

    header .subtitle { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

    /* SC/VSC indicator */
    #sc-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      transition: all 0.3s;
    }
    #sc-indicator.active {
      background: rgba(255, 180, 0, 0.15);
      border-color: var(--yellow);
      color: var(--yellow);
    }
    #sc-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    #sc-indicator.active #sc-dot { background: var(--yellow); }

    /* Connection status */
    #conn-status {
      font-size: 0.7rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #conn-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
    }
    #conn-dot.connected { background: var(--green); }
    #conn-dot.error { background: var(--red); }

    /* Race state bar */
    #state-bar {
      display: flex;
      gap: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .state-item { display: flex; flex-direction: column; gap: 2px; }
    .state-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
    .state-value { font-size: 1.1rem; font-weight: bold; }

    /* Latest call */
    #latest-call {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px;
      margin-bottom: 24px;
      transition: border-color 0.3s;
    }
    #latest-call .call-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 12px;
    }
    #action-badge {
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 0.12em;
      padding: 6px 16px;
      border-radius: 4px;
      text-transform: uppercase;
      min-width: 120px;
      text-align: center;
      background: var(--surface);
      border: 2px solid var(--border);
      color: var(--muted);
      transition: all 0.3s;
    }
    #action-badge.BOX-NOW  { background: rgba(232,0,45,0.15); border-color: var(--red); color: var(--red); }
    #action-badge.STAY-OUT { background: rgba(0,200,83,0.15); border-color: var(--green); color: var(--green); }
    #action-badge.MONITOR  { background: rgba(255,214,0,0.12); border-color: var(--yellow); color: var(--yellow); }

    #confidence-bar-wrap { flex: 1; }
    #confidence-label { font-size: 0.7rem; color: var(--muted); margin-bottom: 4px; }
    #confidence-bar {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    #confidence-fill {
      height: 100%;
      width: 0%;
      background: var(--blue);
      border-radius: 3px;
      transition: width 0.4s;
    }
    #confidence-pct { font-size: 0.8rem; color: var(--text); margin-top: 4px; }

    #reasoning-text {
      font-size: 0.9rem;
      color: var(--text);
      border-left: 3px solid var(--border);
      padding-left: 12px;
      line-height: 1.5;
    }

    #latest-call.BOX-NOW  { border-color: var(--red); }
    #latest-call.STAY-OUT { border-color: var(--green); }
    #latest-call.MONITOR  { border-color: var(--yellow); }

    /* Call feed */
    #feed-section h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 12px;
    }
    #call-feed { display: flex; flex-direction: column; gap: 6px; }

    .feed-item {
      display: grid;
      grid-template-columns: 60px 90px 70px 1fr;
      gap: 12px;
      align-items: center;
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 0.78rem;
      opacity: 0.85;
      transition: opacity 0.3s;
    }
    .feed-item:first-child { opacity: 1; }
    .feed-item .fi-lap { color: var(--muted); }
    .fi-action { font-weight: bold; }
    .fi-action.BOX-NOW  { color: var(--red); }
    .fi-action.STAY-OUT { color: var(--green); }
    .fi-action.MONITOR  { color: var(--yellow); }
    .fi-conf { color: var(--muted); }
    .fi-reason { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    #no-data {
      color: var(--muted);
      font-size: 0.85rem;
      padding: 16px 0;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>F1 Strategist — Pit Wall</h1>
      <div class="subtitle">Real-time strategy via multi-agent swarm</div>
    </div>
    <div style="display:flex;gap:16px;align-items:center;">
      <div id="sc-indicator">
        <div id="sc-dot"></div>
        <span id="sc-label">SC/VSC OFF</span>
      </div>
      <div id="conn-status">
        <div id="conn-dot"></div>
        <span id="conn-label">Connecting…</span>
      </div>
    </div>
  </header>

  <div id="state-bar">
    <div class="state-item">
      <span class="state-label">Lap</span>
      <span class="state-value" id="s-lap">—</span>
    </div>
    <div class="state-item">
      <span class="state-label">Driver</span>
      <span class="state-value" id="s-driver">—</span>
    </div>
    <div class="state-item">
      <span class="state-label">Compound</span>
      <span class="state-value" id="s-compound">—</span>
    </div>
    <div class="state-item">
      <span class="state-label">Stint Lap</span>
      <span class="state-value" id="s-stint">—</span>
    </div>
    <div class="state-item">
      <span class="state-label">Gap Ahead</span>
      <span class="state-value" id="s-gap-ahead">—</span>
    </div>
    <div class="state-item">
      <span class="state-label">Gap Behind</span>
      <span class="state-value" id="s-gap-behind">—</span>
    </div>
  </div>

  <div id="latest-call">
    <div class="call-header">
      <div id="action-badge">WAITING</div>
      <div id="confidence-bar-wrap">
        <div id="confidence-label">Confidence</div>
        <div id="confidence-bar"><div id="confidence-fill"></div></div>
        <div id="confidence-pct">—</div>
      </div>
    </div>
    <div id="reasoning-text">Waiting for first strategy call…</div>
  </div>

  <div id="feed-section">
    <h2>Last 10 Calls</h2>
    <div id="call-feed"><div id="no-data">No calls yet.</div></div>
  </div>

  <script>
    const WS_URL = `ws://${location.host}/ws/strategy`;
    const STATE_URL = `${location.protocol}//${location.host}/state`;

    let callHistory = [];

    // --- State bar ---
    async function fetchState() {
      try {
        const r = await fetch(STATE_URL);
        if (!r.ok) return;
        const s = await r.json();
        document.getElementById('s-lap').textContent = s.lap ?? '—';
        document.getElementById('s-driver').textContent = s.driver ?? '—';
        document.getElementById('s-compound').textContent = s.compound ?? '—';
        document.getElementById('s-stint').textContent = s.stint_lap ?? '—';
        document.getElementById('s-gap-ahead').textContent = s.gap_ahead != null ? s.gap_ahead.toFixed(2) + 's' : '—';
        document.getElementById('s-gap-behind').textContent = s.gap_behind != null ? s.gap_behind.toFixed(2) + 's' : '—';
        updateSCIndicator(s.sc_active, s.vsc_active);
      } catch (_) {}
    }

    function updateSCIndicator(sc, vsc) {
      const el = document.getElementById('sc-indicator');
      const lbl = document.getElementById('sc-label');
      if (sc) { el.className = 'active'; lbl.textContent = 'SC ACTIVE'; }
      else if (vsc) { el.className = 'active'; lbl.textContent = 'VSC ACTIVE'; }
      else { el.className = ''; lbl.textContent = 'SC/VSC OFF'; }
    }

    // --- Action badge ---
    function badgeClass(action) {
      return action === 'BOX NOW' ? 'BOX-NOW' : action === 'STAY OUT' ? 'STAY-OUT' : 'MONITOR';
    }

    function updateLatest(call) {
      const cls = badgeClass(call.action);
      const badge = document.getElementById('action-badge');
      badge.textContent = call.action;
      badge.className = cls;

      const latest = document.getElementById('latest-call');
      latest.className = cls;

      const pct = Math.round(call.confidence * 100);
      document.getElementById('confidence-fill').style.width = pct + '%';
      document.getElementById('confidence-pct').textContent = pct + '%';
      document.getElementById('reasoning-text').textContent = call.reasoning;

      // Update state bar lap
      if (call.lap != null) document.getElementById('s-lap').textContent = call.lap;
      if (call.driver != null) document.getElementById('s-driver').textContent = call.driver;
    }

    // --- Feed ---
    function updateFeed() {
      const feed = document.getElementById('call-feed');
      const noData = document.getElementById('no-data');
      if (callHistory.length === 0) {
        noData.style.display = '';
        return;
      }
      noData.style.display = 'none';
      feed.innerHTML = callHistory.map(c => {
        const cls = badgeClass(c.action);
        return `<div class="feed-item">
          <span class="fi-lap">Lap ${c.lap ?? '?'}</span>
          <span class="fi-action ${cls}">${c.action}</span>
          <span class="fi-conf">${Math.round(c.confidence * 100)}%</span>
          <span class="fi-reason">${c.reasoning}</span>
        </div>`;
      }).join('');
    }

    // --- WebSocket ---
    function connect() {
      const connDot = document.getElementById('conn-dot');
      const connLabel = document.getElementById('conn-label');
      connDot.className = '';
      connLabel.textContent = 'Connecting…';

      const ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        connDot.className = 'connected';
        connLabel.textContent = 'Live';
        fetchState();
      };

      ws.onmessage = (e) => {
        try {
          const call = JSON.parse(e.data);
          callHistory.unshift(call);
          if (callHistory.length > 10) callHistory.length = 10;
          updateLatest(call);
          updateFeed();
          fetchState();
        } catch (_) {}
      };

      ws.onerror = () => {
        connDot.className = 'error';
        connLabel.textContent = 'Error';
      };

      ws.onclose = () => {
        connDot.className = 'error';
        connLabel.textContent = 'Disconnected — retrying…';
        setTimeout(connect, 3000);
      };
    }

    // Fetch state immediately and on an interval (catches updates between WS messages)
    fetchState();
    setInterval(fetchState, 5000);
    connect();
  </script>
</body>
</html>
